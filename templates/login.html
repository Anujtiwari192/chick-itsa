{% extends "base.html" %}
{% block content %}
  <section class="card narrow">
    <h1>Login</h1>
    <form method="post" class="form">
      <label>Username
        <input name="username" required />
      </label>
      <label>Password
        <input name="password" type="password" required />
      </label>
      <button type="submit">Login</button>
    </form>
  </section>
{% endblock %}
